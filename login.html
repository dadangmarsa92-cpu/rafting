<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistem Booking Rafting</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css?v=1.2">
</head>
<body class="login-body">

    <div class="login-container">
        <!-- Floating shapes for background decoration -->
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>

        <div class="login-box">
            <div class="login-header">
                <img src="logo.png" style="width: 80px; height: 80px; border-radius: 12px; margin-bottom: 15px; object-fit: cover; border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
                <h2>CitraElo Rafting</h2>
                <p>Login ke Panel Admin</p>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label>Username</label>
                    <div class="input-with-icon">
                        <i class="ri-user-line"></i>
                        <input type="text" id="username" placeholder="Masukkan username" required autofocus>
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-with-icon">
                        <i class="ri-lock-line"></i>
                        <input type="password" id="password" placeholder="Masukkan password" required style="padding-right: 2.8rem;">
                        <i class="ri-eye-off-line" id="togglePassword" style="left: auto; right: 1rem; cursor: pointer;"></i>
                    </div>
                </div>

                <div class="form-group" style="margin-top: 1rem; margin-bottom: 1rem;">
                    <label>Hak Akses</label>
                    <div class="input-with-icon">
                        <i class="ri-shield-user-line"></i>
                        <select id="role" required style="width: 100%; padding: 0.8rem 1rem 0.8rem 2.8rem; background: rgba(255, 255, 255, 0.8); border: none; font-size: 0.95rem; color: var(--dark); border-radius: var(--radius-sm); outline: none; appearance: none; cursor: pointer;">
                            <option value="" disabled selected>Pilih Hak Akses</option>
                            <option value="Admin">Admin</option>
                            <option value="Keuangan">Keuangan</option>
                            <option value="Super User">Super User</option>
                        </select>
                        <i class="ri-arrow-down-s-line" style="left: auto; right: 1rem; pointer-events: none;"></i>
                    </div>
                </div>
                
                <div class="error-msg" id="error-msg" style="display: none; color: var(--danger); font-size: 0.85rem; padding: 0.5rem; background: rgba(255, 77, 79, 0.1); border-radius: var(--radius-sm); margin-bottom: 1rem; border: 1px solid var(--danger);">
                    Username atau password salah!
                </div>

                <button type="submit" class="login-btn">
                    Masuk <i class="ri-arrow-right-line"></i>
                </button>
            </form>
            
            <div class="login-footer">
                <p>Kredensial Default:<br>Username: <strong>admin</strong> | Password: <strong>admin123</strong></p>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <script src="login.js?v=1.2"></script>
</body>
</html>
